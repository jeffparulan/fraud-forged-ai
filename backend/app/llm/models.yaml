# FraudForge AI — single source of truth for model routing & display names.
# Edit this file to swap models; Python + /api/models + frontend all read from here.
#
# Free-tier note (OpenRouter, July 2026):
#   Live:  nemotron-3-ultra / super / nano-30b / nano-9b (:free)
#   Gone:  qwen/*:free, meta-llama/*:free (404)
# HF chat (Qwen / MedGemma) needs Inference credits (402 without); embeddings stay free.

version: 1

inference:
  openrouter:
    max_tokens: 1536
    temperature: 0.2
    timeout_seconds: 120
  hf:
    max_tokens: 1024
    temperature: 0.2

# Reusable model definitions (referenced by sectors below)
catalog:
  qwen3_32b:
    id: Qwen/Qwen3-32B
    provider: hf
    # Required: HF router has no auto route for this model without a partner.
    hf_provider: featherless-ai
    display: Qwen3-32B
    brand: qwen

  # Own Gradio Space (ZeroGPU) — optional alternate Stage 1 path.
  # Keep warm via .github/workflows/keep-medgemma-space-warm.yml (gentle 24h ping).
  medgemma_4b_space:
    id: ironjeffe/google-medgemma-4b-it
    provider: hf_space
    # Gradio Interface fn name — NOT /predict (this Space has no /predict endpoint)
    space_api_name: /analyze_claim
    display: MedGemma-4B
    brand: google

  # Local MedGemma (Mac Mini via Ollama + ngrok). Env: MEDGEMMA_LOCAL_BASE_URL + MEDGEMMA_LOCAL_API_KEY.
  medgemma_local:
    id: medgemma-local-1.5
    provider: medgemma_local
    display: MedGemma-1.5 (Local)
    brand: google

  medgemma_27b:
    id: google/medgemma-27b-text-it
    provider: hf
    # Only live Inference Provider for MedGemma-27B (Hub mapping).
    # Requires HF Inference credits (402 without) — kept as optional paid path.
    hf_provider: featherless-ai
    display: MedGemma-27B
    brand: google

  nemotron_ultra:
    id: nvidia/nemotron-3-ultra-550b-a55b:free
    provider: openrouter
    display: Nemotron-Ultra-550B
    brand: nvidia

  nemotron_super:
    id: nvidia/nemotron-3-super-120b-a12b:free
    provider: openrouter
    display: Nemotron-Super-120B
    brand: nvidia

  nemotron_nano_30b:
    id: nvidia/nemotron-3-nano-30b-a3b:free
    provider: openrouter
    display: Nemotron-3-Nano-30B
    brand: nvidia

  nemotron_nano_9b:
    id: nvidia/nemotron-nano-9b-v2:free
    provider: openrouter
    display: Nemotron-Nano-9B
    brand: nvidia

# Shared OpenRouter FREE fallback order (referenced by sectors)
free_fallback_chain:
  - nemotron_super
  - nemotron_ultra
  - nemotron_nano_30b
  - nemotron_nano_9b

sectors:
  banking:
    label: Banking & Crypto
    route_display: Qwen3-32B (HF Inference)
    ui_model: Qwen3-32B (HF Inference)
    blurb: Financial reasoning and AML detection with Qwen (Hugging Face)
    primary: qwen3_32b
    # Prefer Super first on free path (faster / more reliable than Ultra when HF 402s)
    fallbacks:
      - nemotron_super
      - nemotron_ultra
      - nemotron_nano_30b
      - nemotron_nano_9b

  medical:
    label: Healthcare & Medical Claims
    # Pipeline order (LangGraph): MCP enrich → Pinecone RAG → Stage1 → Stage2 → fallbacks.
    # Stage 1: local MedGemma (Mac Mini / ngrok; GCP brand mark in UI). On failure, stage1_optional continues.
    # Stage 2: Nemotron-Super (OpenRouter FREE). Fallbacks: Ultra → Nano → optional HF Qwen.
    route_display: "Two-Stage: MedGemma-Local → Nemotron-Super"
    ui_model: "Two-Stage: MedGemma-Local → Nemotron-Super"
    blurb: Clinical validation (local MedGemma) then Nemotron fraud analysis with RAG + MCP
    two_stage: true
    stage1_optional: true
    stage1:
      ref: medgemma_local
      name: Clinical Legitimacy Validation
      purpose: Validate medical coherence, diagnosis-procedure compatibility, clinical plausibility
    stage2:
      ref: nemotron_super
      name: Fraud Pattern Analysis
      purpose: Analyze billing behavior, cost outliers, peer deviation, fraud patterns (uses RAG + MCP)
    fallbacks:
      - nemotron_ultra
      - nemotron_nano_30b
      - nemotron_nano_9b
      - qwen3_32b

  ecommerce:
    label: E-commerce & Marketplace
    route_display: Nemotron-Ultra-550B (OpenRouter FREE)
    ui_model: Nemotron-Ultra-550B (OpenRouter)
    blurb: Marketplace fraud and refund-abuse detection with NVIDIA Nemotron
    primary: nemotron_ultra
    fallbacks:
      - nemotron_super
      - nemotron_nano_30b
      - nemotron_nano_9b

  supply_chain:
    label: Supply Chain & Logistics
    route_display: Nemotron-Ultra-550B (OpenRouter FREE)
    ui_model: Nemotron-Ultra-550B (OpenRouter)
    blurb: Supplier and logistics fraud detection with NVIDIA Nemotron
    primary: nemotron_ultra
    fallbacks:
      - nemotron_super
      - nemotron_nano_30b
      - nemotron_nano_9b

# OFAC / high-risk location field mapping (used by pre-checks)
location_fields:
  banking:
    - source_country
    - destination_country
    - location
  medical:
    - provider_location
    - patient_location
    - billing_address
    - service_location
  ecommerce:
    - shipping_location
    - shipping_address
    - billing_address
    - origin_country
  supply_chain:
    - supplier_location
    - supplier_country
    - origin_country
    - shipping_location
    - billing_address
