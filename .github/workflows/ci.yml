name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege — these jobs only read the repo (checkout / test / build / validate).
permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: python -m pytest tests/unit/ --cov=app.core --cov-report=term-missing
        env:
          GCP_PROJECT_ID: local-dev

  frontend-build:
    name: Frontend build (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Init (no backend) and validate
        run: |
          terraform init -backend=false
          terraform validate
          terraform fmt -check -recursive
